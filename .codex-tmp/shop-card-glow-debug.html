<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Card Glow Debug</title>
    <link rel="stylesheet" href="/src/App.css" />
    <style>
      body { min-height: 100vh; padding: 56px; }
      .debug-row { display: grid; grid-template-columns: repeat(4, 240px); gap: 28px; align-items: start; }
      .debug-card-content { display: contents; }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="shop-shelf sketch-panel visual-theme-surface">
        <div class="offer-row debug-row">
          <button class="item-card paper-item-card handdrawn-item-frame shop-card paper-shop-card paper-card item-tone-utility quality-bronze">
            <span class="quality-chip shop-quality-chip">铜</span>
            <div class="item-art-window icon-art shop-card-art"><img class="item-card-icon-art" src="/assets/sticker-icons/small-bite.webp" alt="" /></div>
            <div class="shop-card-main"><strong>铜纸条</strong><span class="size-badge item-tone-utility">1格</span></div>
            <div class="shop-card-meta"><span class="dice-line">1/2/3</span></div>
            <span class="effect-line">用于验证纸条背后的品质色光效。</span>
            <span class="price-tag">3</span>
          </button>
          <button class="item-card paper-item-card handdrawn-item-frame shop-card paper-shop-card paper-card item-tone-utility quality-silver">
            <span class="quality-chip shop-quality-chip">银</span>
            <div class="item-art-window icon-art shop-card-art"><img class="item-card-icon-art" src="/assets/sticker-icons/v3-auto-waterer.webp" alt="" /></div>
            <div class="shop-card-main"><strong>银纸条</strong><span class="size-badge item-tone-utility">2格</span></div>
            <div class="shop-card-meta"><span class="dice-line">1/2/3</span></div>
            <span class="effect-line">用于验证纸条背后的品质色光效。</span>
            <span class="price-tag">9</span>
          </button>
          <button class="item-card paper-item-card handdrawn-item-frame shop-card paper-shop-card paper-card item-tone-utility quality-gold">
            <span class="quality-chip shop-quality-chip">金</span>
            <div class="item-art-window icon-art shop-card-art"><img class="item-card-icon-art" src="/assets/sticker-icons/v3-night-patrol-light.webp" alt="" /></div>
            <div class="shop-card-main"><strong>金纸条</strong><span class="size-badge item-tone-utility">2格</span></div>
            <div class="shop-card-meta"><span class="dice-line">1/2/3</span></div>
            <span class="effect-line">用于验证纸条背后的品质色光效。</span>
            <span class="price-tag">12</span>
          </button>
          <button class="item-card paper-item-card handdrawn-item-frame shop-card paper-shop-card paper-card item-tone-utility quality-diamond">
            <span class="quality-chip shop-quality-chip">钻</span>
            <div class="item-art-window icon-art shop-card-art"><img class="item-card-icon-art" src="/assets/sticker-icons/v3-golden-kennel.webp" alt="" /></div>
            <div class="shop-card-main"><strong>钻纸条</strong><span class="size-badge item-tone-utility">4格</span></div>
            <div class="shop-card-meta"><span class="dice-line">4/5</span></div>
            <span class="effect-line">用于验证纸条背后的品质色光效。</span>
            <span class="price-tag">11</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
