name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build frontend deployment marker
        timeout-minutes: 5
        run: |
          npm ci
          NODE_ENV=production npm run build
          EXPECTED_JS="$(sed -n 's/.*src="\/\(assets\/index-[^"]*\.js\)".*/\1/p' dist/index.html | head -n 1)"
          EXPECTED_CSS="$(sed -n 's/.*href="\/\(assets\/index-[^"]*\.css\)".*/\1/p' dist/index.html | head -n 1)"
          if [ -z "$EXPECTED_JS" ] || [ -z "$EXPECTED_CSS" ]; then
            echo "Could not derive expected frontend assets from dist/index.html"
            cat dist/index.html
            exit 1
          fi
          echo "EXPECTED_JS=$EXPECTED_JS" >> "$GITHUB_ENV"
          echo "EXPECTED_CSS=$EXPECTED_CSS" >> "$GITHUB_ENV"
          echo "Expected frontend assets: $EXPECTED_JS / $EXPECTED_CSS"

      - name: Package source
        timeout-minutes: 2
        run: |
          SOURCE_PACKAGE="$RUNNER_TEMP/dogfight-source-${GITHUB_SHA}.tar.gz"
          PRODUCTION_ENV_FILE="$RUNNER_TEMP/dogfight-production-${GITHUB_SHA}.env"
          printf '%s\n' "${{ secrets.PRODUCTION_ENV }}" > "$PRODUCTION_ENV_FILE"
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=dist-click \
            --exclude=.env.production \
            --exclude=.superpowers \
            --exclude=docs/superpowers \
            --exclude=picture \
            -czf "$SOURCE_PACKAGE" .
          echo "SOURCE_PACKAGE=$SOURCE_PACKAGE" >> "$GITHUB_ENV"
          echo "PRODUCTION_ENV_FILE=$PRODUCTION_ENV_FILE" >> "$GITHUB_ENV"
          echo "REMOTE_PACKAGE=/tmp/dogfight-source-${GITHUB_SHA}.tar.gz" >> "$GITHUB_ENV"
          echo "REMOTE_ENV_FILE=/tmp/dogfight-production-${GITHUB_SHA}.env" >> "$GITHUB_ENV"
          echo "REMOTE_SCRIPT=/tmp/dogfight-deploy-${GITHUB_SHA}.sh" >> "$GITHUB_ENV"

      - name: Configure SSH
        timeout-minutes: 2
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dogfight_deploy_key
          chmod 600 ~/.ssh/dogfight_deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload source package
        timeout-minutes: 15
        run: |
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$SOURCE_PACKAGE" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$REMOTE_PACKAGE"
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$PRODUCTION_ENV_FILE" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$REMOTE_ENV_FILE"
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            deploy/remote-deploy.sh \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$REMOTE_SCRIPT"

      - name: Deploy to Tencent Cloud
        timeout-minutes: 35
        run: |
          ssh -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' REMOTE_PACKAGE='$REMOTE_PACKAGE' REMOTE_ENV_FILE='$REMOTE_ENV_FILE' REMOTE_SCRIPT='$REMOTE_SCRIPT' GITHUB_SHA='${{ github.sha }}' EXPECTED_JS='$EXPECTED_JS' EXPECTED_CSS='$EXPECTED_CSS' bash '$REMOTE_SCRIPT'"
