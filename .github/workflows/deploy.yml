name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build frontend deployment marker
        timeout-minutes: 5
        run: |
          npm ci
          NODE_ENV=production npm run build
          EXPECTED_JS="$(sed -n 's/.*src="\/\(assets\/index-[^"]*\.js\)".*/\1/p' dist/index.html | head -n 1)"
          EXPECTED_CSS="$(sed -n 's/.*href="\/\(assets\/index-[^"]*\.css\)".*/\1/p' dist/index.html | head -n 1)"
          if [ -z "$EXPECTED_JS" ] || [ -z "$EXPECTED_CSS" ]; then
            echo "Could not derive expected frontend assets from dist/index.html"
            cat dist/index.html
            exit 1
          fi
          echo "EXPECTED_JS=$EXPECTED_JS" >> "$GITHUB_ENV"
          echo "EXPECTED_CSS=$EXPECTED_CSS" >> "$GITHUB_ENV"
          echo "Expected frontend assets: $EXPECTED_JS / $EXPECTED_CSS"

      - name: Configure SSH
        timeout-minutes: 2
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dogfight_deploy_key
          chmod 600 ~/.ssh/dogfight_deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Tencent Cloud
        timeout-minutes: 60
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          PRODUCTION_ENV_B64="$(printf '%s\n' "$PRODUCTION_ENV" | base64 -w0)"
          PACKAGE_PATH="/tmp/dogfight-source-${{ github.sha }}.tgz"
          REMOTE_PACKAGE="/tmp/dogfight-source-${{ github.sha }}.tgz"
          REMOTE_SCRIPT="/tmp/dogfight-remote-deploy-${{ github.sha }}.sh"
          tar -czf "$PACKAGE_PATH" \
            deploy prisma public scripts src \
            .dockerignore Caddyfile Dockerfile compose.yml index.html package-lock.json package.json \
            tsconfig.app.json tsconfig.json tsconfig.node.json tsconfig.server.json vite.config.ts
          ls -lh "$PACKAGE_PATH"
          echo "Uploading source package to Tencent Cloud..."
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$PACKAGE_PATH" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$REMOTE_PACKAGE"
          echo "Uploading remote deploy script to Tencent Cloud..."
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            deploy/remote-deploy.sh \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$REMOTE_SCRIPT"
          echo "Starting remote deploy script on Tencent Cloud..."
          ssh -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='$DEPLOY_PATH' GITHUB_SHA='${{ github.sha }}' REMOTE_PACKAGE='$REMOTE_PACKAGE' REMOTE_SCRIPT='$REMOTE_SCRIPT' PRODUCTION_ENV_B64='$PRODUCTION_ENV_B64' EXPECTED_JS='$EXPECTED_JS' EXPECTED_CSS='$EXPECTED_CSS' bash -s" <<'REMOTE_BOOTSTRAP'
          set -euo pipefail
          : "${GITHUB_SHA:?GITHUB_SHA is required}"
          : "${REMOTE_PACKAGE:?REMOTE_PACKAGE is required}"
          : "${REMOTE_SCRIPT:?REMOTE_SCRIPT is required}"
          trap 'rm -f "$REMOTE_PACKAGE" "$REMOTE_SCRIPT"' EXIT
          bash -c 'tar -tzf "$REMOTE_PACKAGE" >/dev/null'
          bash "$REMOTE_SCRIPT"
          REMOTE_BOOTSTRAP
