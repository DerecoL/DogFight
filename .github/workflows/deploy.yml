name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build frontend deployment marker
        timeout-minutes: 5
        run: |
          npm ci
          NODE_ENV=production npm run build
          EXPECTED_JS="$(sed -n 's/.*src="\/\(assets\/index-[^"]*\.js\)".*/\1/p' dist/index.html | head -n 1)"
          EXPECTED_CSS="$(sed -n 's/.*href="\/\(assets\/index-[^"]*\.css\)".*/\1/p' dist/index.html | head -n 1)"
          if [ -z "$EXPECTED_JS" ] || [ -z "$EXPECTED_CSS" ]; then
            echo "Could not derive expected frontend assets from dist/index.html"
            cat dist/index.html
            exit 1
          fi
          echo "EXPECTED_JS=$EXPECTED_JS" >> "$GITHUB_ENV"
          echo "EXPECTED_CSS=$EXPECTED_CSS" >> "$GITHUB_ENV"
          echo "Expected frontend assets: $EXPECTED_JS / $EXPECTED_CSS"

      - name: Configure SSH
        timeout-minutes: 2
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dogfight_deploy_key
          chmod 600 ~/.ssh/dogfight_deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Tencent Cloud
        timeout-minutes: 60
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          PRODUCTION_ENV_B64="$(printf '%s\n' "$PRODUCTION_ENV" | base64 -w0)"
          ssh -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='$DEPLOY_PATH' GITHUB_SHA='${{ github.sha }}' GITHUB_REPOSITORY='${{ github.repository }}' DEPLOY_REPO_TOKEN='$DEPLOY_REPO_TOKEN' PRODUCTION_ENV_B64='$PRODUCTION_ENV_B64' EXPECTED_JS='$EXPECTED_JS' EXPECTED_CSS='$EXPECTED_CSS' bash -s" <<'REMOTE_BOOTSTRAP'
          set -euo pipefail
          : "${GITHUB_SHA:?GITHUB_SHA is required}"
          : "${GITHUB_REPOSITORY:?GITHUB_REPOSITORY is required}"

          BOOTSTRAP_PATH="/tmp/dogfight-bootstrap-${GITHUB_SHA}"
          rm -rf "$BOOTSTRAP_PATH"
          trap 'rm -rf "$BOOTSTRAP_PATH"' EXIT

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          if [ -n "${DEPLOY_REPO_TOKEN:-}" ]; then
            REPO_URL="https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git init "$BOOTSTRAP_PATH"
          cd "$BOOTSTRAP_PATH"
          git remote add origin "$REPO_URL"
          git sparse-checkout init --cone
          git sparse-checkout set deploy prisma public scripts src Caddyfile Dockerfile compose.yml index.html package-lock.json package.json tsconfig.app.json tsconfig.json tsconfig.node.json tsconfig.server.json vite.config.ts
          fetch_attempt=1
          until git fetch --filter=blob:none --depth 1 origin "$GITHUB_SHA"; do
            if [ "$fetch_attempt" -ge 5 ]; then
              exit 1
            fi
            echo "git fetch attempt $fetch_attempt failed; retrying"
            fetch_attempt=$((fetch_attempt + 1))
            sleep 10
          done
          git checkout --detach "$GITHUB_SHA"
          SOURCE_PATH="$BOOTSTRAP_PATH" bash deploy/remote-deploy.sh
          REMOTE_BOOTSTRAP
