name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        timeout-minutes: 2
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dogfight_deploy_key
          chmod 600 ~/.ssh/dogfight_deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Tencent Cloud
        timeout-minutes: 35
        env:
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_SHA='$GITHUB_SHA' DEPLOY_REPO_TOKEN='$DEPLOY_REPO_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail

          TEMP_DEPLOY_PATH="${DEPLOY_PATH}.repo-tmp"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          if [ -n "${DEPLOY_REPO_TOKEN:-}" ]; then
            REPO_URL="https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          mkdir -p "$DEPLOY_PATH"
          rm -rf "$TEMP_DEPLOY_PATH"
          git clone --filter=blob:none --no-checkout "$REPO_URL" "$TEMP_DEPLOY_PATH"
          cd "$TEMP_DEPLOY_PATH"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach "$GITHUB_SHA"

          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name backups ! -name .env.production -exec rm -rf {} +
          cp -a "$TEMP_DEPLOY_PATH"/. "$DEPLOY_PATH"/
          rm -rf "$TEMP_DEPLOY_PATH"

          cat > "$DEPLOY_PATH/.env.production" <<'ENV'
          ${{ secrets.PRODUCTION_ENV }}
          ENV

          if ! grep -q '^DATABASE_URL=' "$DEPLOY_PATH/.env.production"; then
            echo "PRODUCTION_ENV must include DATABASE_URL"
            exit 1
          fi

          cd "$DEPLOY_PATH"
          docker compose up -d --build
          docker compose ps
          REMOTE
