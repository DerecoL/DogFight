name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package source
        timeout-minutes: 2
        run: |
          SOURCE_PACKAGE="$RUNNER_TEMP/dogfight-source-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=dist-click \
            --exclude=.env.production \
            --exclude=.superpowers \
            --exclude=docs/superpowers \
            --exclude=picture \
            -czf "$SOURCE_PACKAGE" .
          echo "SOURCE_PACKAGE=$SOURCE_PACKAGE" >> "$GITHUB_ENV"
          echo "REMOTE_PACKAGE=/tmp/dogfight-source-${GITHUB_SHA}.tar.gz" >> "$GITHUB_ENV"

      - name: Configure SSH
        timeout-minutes: 2
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dogfight_deploy_key
          chmod 600 ~/.ssh/dogfight_deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload source package
        timeout-minutes: 15
        run: |
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$SOURCE_PACKAGE" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$REMOTE_PACKAGE"

      - name: Deploy to Tencent Cloud
        timeout-minutes: 35
        run: |
          ssh -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' REMOTE_PACKAGE='$REMOTE_PACKAGE' bash -s" <<'REMOTE'
          set -euo pipefail

          TEMP_DEPLOY_PATH="${DEPLOY_PATH}.repo-tmp"

          mkdir -p "$DEPLOY_PATH"
          rm -rf "$TEMP_DEPLOY_PATH"
          mkdir -p "$TEMP_DEPLOY_PATH"
          tar -xzf "$REMOTE_PACKAGE" -C "$TEMP_DEPLOY_PATH"

          cat > "$TEMP_DEPLOY_PATH/.env.production" <<'ENV'
          ${{ secrets.PRODUCTION_ENV }}
          ENV

          if ! grep -q '^DATABASE_URL=' "$TEMP_DEPLOY_PATH/.env.production"; then
            echo "PRODUCTION_ENV must include DATABASE_URL"
            exit 1
          fi

          cd "$TEMP_DEPLOY_PATH"
          docker compose --env-file .env.production config >/dev/null

          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name backups ! -name .env.production -exec rm -rf {} +
          cp -a "$TEMP_DEPLOY_PATH"/. "$DEPLOY_PATH"/
          rm -rf "$TEMP_DEPLOY_PATH" "$REMOTE_PACKAGE"

          cd "$DEPLOY_PATH"
          docker compose up -d --build --remove-orphans
          docker compose ps
          docker compose exec -T api node --input-type=module -e "const response = await fetch('http://localhost:4000/api/health'); if (!response.ok) { console.error(await response.text()); process.exit(1); } console.log(await response.text());"
          REMOTE
