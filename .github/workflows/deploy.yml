name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_REPO_TOKEN="${{ secrets.DEPLOY_REPO_TOKEN }}"
            ARCHIVE_URL="https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz"
            ARCHIVE_PATH="/tmp/dogfight-${{ github.sha }}.tar.gz"
            TEMP_DEPLOY_PATH="${DEPLOY_PATH}.repo-tmp"

            mkdir -p "$DEPLOY_PATH"
            rm -rf "$TEMP_DEPLOY_PATH"
            mkdir -p "$TEMP_DEPLOY_PATH"

            if [ -n "$DEPLOY_REPO_TOKEN" ]; then
              curl -fL --retry 3 --retry-delay 5 -H "Authorization: Bearer ${DEPLOY_REPO_TOKEN}" "$ARCHIVE_URL" -o "$ARCHIVE_PATH"
            else
              curl -fL --retry 3 --retry-delay 5 "$ARCHIVE_URL" -o "$ARCHIVE_PATH"
            fi

            tar -xzf "$ARCHIVE_PATH" -C "$TEMP_DEPLOY_PATH" --strip-components=1
            find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name backups ! -name .env.production -exec rm -rf {} +
            cp -a "$TEMP_DEPLOY_PATH"/. "$DEPLOY_PATH"/
            rm -rf "$TEMP_DEPLOY_PATH" "$ARCHIVE_PATH"

            cat > .env.production <<'ENV'
            ${{ secrets.PRODUCTION_ENV }}
            ENV

            if ! grep -q '^DATABASE_URL=' .env.production; then
              echo "PRODUCTION_ENV must include DATABASE_URL"
              exit 1
            fi

            docker compose up -d --build
            docker compose ps
