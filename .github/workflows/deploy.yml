name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package source
        run: |
          tar -czf "$RUNNER_TEMP/dogfight-source.tar.gz" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='dist-click' \
            --exclude='.pglite' \
            --exclude='.worktrees' \
            --exclude='.codex-*' \
            .

      - name: Configure SSH
        timeout-minutes: 2
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/dogfight_deploy_key
          chmod 600 ~/.ssh/dogfight_deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload source package
        timeout-minutes: 15
        run: |
          scp -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$RUNNER_TEMP/dogfight-source.tar.gz" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/dogfight-${{ github.sha }}.tar.gz"

      - name: Deploy to Tencent Cloud
        timeout-minutes: 18
        run: |
          ssh -i ~/.ssh/dogfight_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' ARCHIVE_PATH='/tmp/dogfight-${{ github.sha }}.tar.gz' bash -s" <<'REMOTE'
          set -euo pipefail

          TEMP_DEPLOY_PATH="${DEPLOY_PATH}.repo-tmp"

          mkdir -p "$DEPLOY_PATH"
          rm -rf "$TEMP_DEPLOY_PATH"
          mkdir -p "$TEMP_DEPLOY_PATH"

          tar -xzf "$ARCHIVE_PATH" -C "$TEMP_DEPLOY_PATH"
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name backups ! -name .env.production -exec rm -rf {} +
          cp -a "$TEMP_DEPLOY_PATH"/. "$DEPLOY_PATH"/
          rm -rf "$TEMP_DEPLOY_PATH" "$ARCHIVE_PATH"

          cat > "$DEPLOY_PATH/.env.production" <<'ENV'
          ${{ secrets.PRODUCTION_ENV }}
          ENV

          if ! grep -q '^DATABASE_URL=' "$DEPLOY_PATH/.env.production"; then
            echo "PRODUCTION_ENV must include DATABASE_URL"
            exit 1
          fi

          cd "$DEPLOY_PATH"
          docker compose up -d --build
          docker compose ps
          REMOTE
